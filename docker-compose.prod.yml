services:
  frontend:
    image: ${DOCKER_USERNAME}/dream-vacation-frontend:latest
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - dreamnet

  backend:
    image: ${DOCKER_USERNAME}/dream-vacation-backend:latest
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    depends_on:
      - db
    networks:
      - dreamnet

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dreamvacations
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dreamnet

volumes:
  pgdata:

networks:
  dreamnet:
    driver: bridge