name: Backend CI/CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  backend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build backend image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dream-vacation-backend:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/dream-vacation-backend:${{ github.sha }} \
          ${{ secrets.DOCKER_USERNAME }}/dream-vacation-backend:latest

      - name: Push backend image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dream-vacation-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/dream-vacation-backend:latest
